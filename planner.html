     <main>

      <section class="page-intro container">
        <h1>Academic Planner</h1>
        <p>Track your tasks, mark them complete, and stay on top of your studies.</p>
      </section>

      <section class="planner">

        <!-- INPUT AREA -->
        <div class="planner-input">
          <input
            type="text"
            id="task-input"
            placeholder="Add a new task e.g. Study HTML..."
          >
          <button id="add-btn">Add Task</button>
        </div>

         <!-- FILTER BUTTONS -->
        <div class="planner-filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="pending">Pending</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>


        <ul id="task-list">
          Tasks will appear here dynamically
        </ul>

        <!-- TASK COUNTER -->
        <p id="task-counter">0 tasks remaining</p>

      </section>
    </main>

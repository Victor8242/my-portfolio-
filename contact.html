     <main>

      <section class="page-intro container">
        <h1>Contact Me</h1>
        <p>Have a question or want to connect? Send me a message below.</p>
      </section>

       <section class="contact-section">

        <form id="contact-form" novalidate>

          <!-- NAME FIELD -->
          <div class="form-group">
            <label for="name">Full Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Your full name"
            >
            <span class="error-msg" id="name-error"></span>
          </div>


          <!-- EMAIL FIELD -->
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="student@gmail.com"
            >
            <span class="error-msg" id="email-error"></span>
          </div>

           <!-- PHONE FIELD -->
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="08012345678"
            >
            <span class="error-msg" id="phone-error"></span>
          </div>

          <!-- MESSAGE FIELD -->
          <div class="form-group">
            <label for="message">Message</label>
            <textarea
              id="message"
              name="message"
              rows="6"
              placeholder="Write your message here..."
            ></textarea>
            <span class="error-msg" id="message-error"></span>
          </div>

          <button type="submit" id="submit-btn">Send Message</button>

           <!-- SUCCESS MESSAGE (hidden until form submits successfully) -->
          <p id="success-msg" class="success-msg">
            Your message has been sent successfully!
          </p>

        </form>
      </section>
    </main>
